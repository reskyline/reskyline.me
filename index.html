<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reskyline</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=Outfit:wght@200;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- BOOT SEQUENCE -->
<div id="boot">
  <div id="boot-inner">
    <div id="boot-text"></div>
    <div class="progress-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label" id="progress-label">0%</div>
    </div>
  </div>
</div>

<canvas id="ascii-canvas"></canvas>
<canvas id="rain-canvas"></canvas>
<canvas id="trail-canvas"></canvas>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fas fa-check toast-icon"></i>
  <span class="toast-msg"><span>reskylines</span> copied to clipboard</span>
</div>

<div class="scene">
  <div class="panel-wrap" id="panel-wrap">
    <canvas id="beam-canvas"></canvas>

    <div class="card-flipper" id="card-flipper">

      <!-- FRONT -->
      <div class="card-face card-front" id="panel">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="clock" id="clock">local time: 00:00:00</div>
        <img class="avatar" src="icon.jpg" alt="reskyline" />
        <h1><span id="title-text"></span><span class="cursor" id="title-cursor"></span></h1>
        <p class="subtitle">programmer</p>
        <div class="divider"></div>

        <div class="typewriter-wrap">
          <span id="typewriter-text"></span><span class="cursor"></span>
        </div>

        <div class="social-icons">
          <a href="#" class="glass-icon" id="discord-btn" title="Copy Discord username">
            <i class="fab fa-discord"></i>
          </a>
          <a href="https://github.com/4ut" target="_blank" class="glass-icon">
            <i class="fab fa-github"></i>
          </a>
        </div>

        <div class="front-btns">
          <button class="flip-btn" id="about-btn">
            <i class="fas fa-user"></i> about
          </button>
          <button class="flip-btn" id="projects-btn">
            <i class="fas fa-code"></i> projects
          </button>
        </div>
      </div>

      <!-- BACK -->
      <div class="card-face card-back">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <button class="back-btn" id="back-btn">
          <i class="fas fa-arrow-left"></i> back
        </button>

        <!-- PROJECTS PANEL -->
        <div id="back-projects">
          <h2 class="back-title">projects</h2>
          <div class="divider" style="margin-bottom:1.2rem;"></div>
          <div class="project-list">
            <a class="project-card" href="https://github.com/4ut" target="_blank">
              <div class="project-name">vast <i class="fas fa-arrow-up-right-from-square" style="font-size:10px;opacity:0.6;"></i></div>
              <div class="project-desc">WIP</div>
              <div class="project-tags">
                <span class="project-tag">Python</span>
              </div>
            </a>
          </div>
        </div>

        <!-- ABOUT PANEL -->
        <div id="back-about" class="hidden">
          <h2 class="back-title">about</h2>
          <div class="divider" style="margin-bottom:1.2rem;"></div>
          <p class="about-bio">hi i like to code!</p>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
